<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CSS + JS Analog Clock</title>
</head>
<body>
    <!-- Full-screen wrapper used to center the clock -->
    <div class="overlay">

        <!-- Holds the numbers and the three hands -->
        <div class="clock">

            <!-- Clock numbers (1-12). The --d custom property is used in CSS
                 to position each number around the circle via rotation. -->
            <div class="number" style="--d: 1;">1</div>
            <div class="number" style="--d: 2;">2</div>
            <div class="number" style="--d: 3;">3</div>
            <div class="number" style="--d: 4;">4</div>
            <div class="number" style="--d: 5;">5</div>
            <div class="number" style="--d: 6;">6</div>
            <div class="number" style="--d: 7;">7</div>
            <div class="number" style="--d: 8;">8</div>
            <div class="number" style="--d: 9;">9</div>
            <div class="number" style="--d: 10;">10</div>
            <div class="number" style="--d: 11;">11</div>
            <div class="number" style="--d: 12;">12</div>

            <!-- Clock hands -->
            <div class="second"></div>
            <div class="minute"></div>
            <div class="hour"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
