<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/sounds.css">
    <title>Sounds Board</title>
</head>
<body>
    <main>
        <!-- Each .sound box is linked to an <audio> tag through the data-key attribute.
             Pressing the matching key on the keyboard plays the sound of the box. -->
        <div class="overlay container">
            <div class="sound" data-key="a">
                <h1>A</h1>
                <span class="label">meow</span>
            </div>
            <div class="sound" data-key="b">
                <h1>B</h1>
                <span class="label">dog</span>
            </div>
            <div class="sound" data-key="c">
                <h1>C</h1>
                <span class="label">fire</span>
            </div>
            <div class="sound" data-key="d">
                <h1>D</h1>
                <span class="label">wind</span>
            </div>
        </div>

        <!-- Audio sources matched to each key via data-key -->
        <audio src="../audio/meow.mp3" data-key="a"></audio>
        <audio src="../audio/dog.mp3" data-key="b"></audio>
        <audio src="../audio/fire.mp3" data-key="c"></audio>
        <audio src="../audio/wind.mp3" data-key="d"></audio>

        <script>
            // Play the matching sound and trigger the animation when a key is pressed
            window.addEventListener('keydown', function(e) {
                const key = e.key.toLowerCase();
                const sound = document.querySelector(`.sound[data-key="${key}"]`);
                const audio = document.querySelector(`audio[data-key="${key}"]`);

                // Ignore keys that don't have a matching sound
                if (!audio || !sound) return;

                // Rewind so the sound can be replayed even if it's still playing
                audio.currentTime = 0;
                audio.play();

                // Add the CSS class that scales the box up
                sound.classList.add('change');
            });

            // Remove the animation class once the transform transition ends
            function removeTransition(e) {
                // Only react to the transform property to avoid duplicate triggers
                if (e.propertyName !== 'transform') return;
                this.classList.remove('change');
            }

            // Attach the transitionend listener to every .sound box
            const sounds = document.querySelectorAll('.sound');
            sounds.forEach(sound => sound.addEventListener('transitionend', removeTransition));
        </script>
    </main>
</body>
</html>
